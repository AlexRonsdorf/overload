<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Overload</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Overload">
<meta name="theme-color" content="#0C0D0F">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<style>
  :root{
    --bg:#F4F4F2; --surface:#FFFFFF; --surface2:#ECECEA;
    --ink:#17181A; --ink2:#6E7176; --ink3:#A0A3A8;
    --line:#E4E4E1; --accent:#2E4FE0; --accent-ink:#FFFFFF; --accent-soft:rgba(46,79,224,.10);
    --danger:#C43D3D; --toast-accent:#9DB1FF; --up:#15803D; --up-ink:#FFFFFF;
    --radius:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0C0D0F; --surface:#151619; --surface2:#1E2024;
      --ink:#F3F3F1; --ink2:#A2A5AA; --ink3:#686B71;
      --line:#26282D; --accent:#5D7CFF; --accent-ink:#0B0C0E; --accent-soft:rgba(93,124,255,.14);
      --danger:#E06A6A; --toast-accent:#2E4FE0; --up:#4ADE80; --up-ink:#0B0C0E;
    }
  }
  :root[data-theme="light"]{
    --bg:#F4F4F2; --surface:#FFFFFF; --surface2:#ECECEA;
    --ink:#17181A; --ink2:#6E7176; --ink3:#A0A3A8;
    --line:#E4E4E1; --accent:#2E4FE0; --accent-ink:#FFFFFF; --accent-soft:rgba(46,79,224,.10);
    --danger:#C43D3D; --toast-accent:#9DB1FF; --up:#15803D; --up-ink:#FFFFFF;
  }
  :root[data-theme="dark"]{
    --bg:#0C0D0F; --surface:#151619; --surface2:#1E2024;
    --ink:#F3F3F1; --ink2:#A2A5AA; --ink3:#686B71;
    --line:#26282D; --accent:#5D7CFF; --accent-ink:#0B0C0E; --accent-soft:rgba(93,124,255,.14);
    --danger:#E06A6A; --toast-accent:#2E4FE0; --up:#4ADE80; --up-ink:#0B0C0E;
  }

  /* Akzentfarben (jeweils helle + dunkle Variante); Blau ist der Standard oben */
  :root[data-accent="violet"]{ --accent:#6D28D9; --accent-ink:#FFFFFF; --accent-soft:rgba(109,40,217,.10); --toast-accent:#A78BFA; }
  :root[data-accent="green"]{ --accent:#047857; --accent-ink:#FFFFFF; --accent-soft:rgba(4,120,87,.10); --toast-accent:#34D399; }
  :root[data-accent="orange"]{ --accent:#C2410C; --accent-ink:#FFFFFF; --accent-soft:rgba(194,65,12,.10); --toast-accent:#FB923C; }
  :root[data-accent="pink"]{ --accent:#BE185D; --accent-ink:#FFFFFF; --accent-soft:rgba(190,24,93,.10); --toast-accent:#F472B6; }
  @media (prefers-color-scheme: dark){
    :root[data-accent="violet"]{ --accent:#A78BFA; --accent-ink:#0B0C0E; --accent-soft:rgba(167,139,250,.14); --toast-accent:#6D28D9; }
    :root[data-accent="green"]{ --accent:#34D399; --accent-ink:#0B0C0E; --accent-soft:rgba(52,211,153,.14); --toast-accent:#047857; }
    :root[data-accent="orange"]{ --accent:#FB923C; --accent-ink:#0B0C0E; --accent-soft:rgba(251,146,60,.14); --toast-accent:#C2410C; }
    :root[data-accent="pink"]{ --accent:#F472B6; --accent-ink:#0B0C0E; --accent-soft:rgba(244,114,182,.14); --toast-accent:#BE185D; }
  }
  :root[data-theme="light"][data-accent="violet"]{ --accent:#6D28D9; --accent-ink:#FFFFFF; --accent-soft:rgba(109,40,217,.10); --toast-accent:#A78BFA; }
  :root[data-theme="light"][data-accent="green"]{ --accent:#047857; --accent-ink:#FFFFFF; --accent-soft:rgba(4,120,87,.10); --toast-accent:#34D399; }
  :root[data-theme="light"][data-accent="orange"]{ --accent:#C2410C; --accent-ink:#FFFFFF; --accent-soft:rgba(194,65,12,.10); --toast-accent:#FB923C; }
  :root[data-theme="light"][data-accent="pink"]{ --accent:#BE185D; --accent-ink:#FFFFFF; --accent-soft:rgba(190,24,93,.10); --toast-accent:#F472B6; }
  :root[data-theme="dark"][data-accent="violet"]{ --accent:#A78BFA; --accent-ink:#0B0C0E; --accent-soft:rgba(167,139,250,.14); --toast-accent:#6D28D9; }
  :root[data-theme="dark"][data-accent="green"]{ --accent:#34D399; --accent-ink:#0B0C0E; --accent-soft:rgba(52,211,153,.14); --toast-accent:#047857; }
  :root[data-theme="dark"][data-accent="orange"]{ --accent:#FB923C; --accent-ink:#0B0C0E; --accent-soft:rgba(251,146,60,.14); --toast-accent:#C2410C; }
  :root[data-theme="dark"][data-accent="pink"]{ --accent:#F472B6; --accent-ink:#0B0C0E; --accent-soft:rgba(244,114,182,.14); --toast-accent:#BE185D; }

  /* Farb-Punkte in den Settings */
  .swatches{ display:flex; gap:14px; margin-top:10px; }
  .swatch{ width:36px; height:36px; border-radius:50%; border:none; cursor:pointer; position:relative; }
  .swatch.active::after{ content:""; position:absolute; inset:-6px; border:2px solid var(--ink); border-radius:50%; }
  .sw-blue{ background:#2E4FE0; } .sw-violet{ background:#6D28D9; } .sw-green{ background:#047857; }
  .sw-orange{ background:#C2410C; } .sw-pink{ background:#BE185D; }
  @media (prefers-color-scheme: dark){
    .sw-blue{ background:#5D7CFF; } .sw-violet{ background:#A78BFA; } .sw-green{ background:#34D399; }
    .sw-orange{ background:#FB923C; } .sw-pink{ background:#F472B6; }
  }
  :root[data-theme="light"] .sw-blue{ background:#2E4FE0; } :root[data-theme="light"] .sw-violet{ background:#6D28D9; }
  :root[data-theme="light"] .sw-green{ background:#047857; } :root[data-theme="light"] .sw-orange{ background:#C2410C; }
  :root[data-theme="light"] .sw-pink{ background:#BE185D; }
  :root[data-theme="dark"] .sw-blue{ background:#5D7CFF; } :root[data-theme="dark"] .sw-violet{ background:#A78BFA; }
  :root[data-theme="dark"] .sw-green{ background:#34D399; } :root[data-theme="dark"] .sw-orange{ background:#FB923C; }
  :root[data-theme="dark"] .sw-pink{ background:#F472B6; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
    font-size:16px; line-height:1.45;
    touch-action:manipulation;
    overscroll-behavior-y:none;
    -webkit-text-size-adjust:100%;
  }
  button, .tab, .chip, .listitem{ -webkit-user-select:none; user-select:none; }
  #app{
    max-width:460px; margin:0 auto;
    padding:calc(16px + env(safe-area-inset-top)) 18px calc(96px + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  #statusbar-shim{
    position:fixed; top:0; left:0; right:0; z-index:11;
    height:env(safe-area-inset-top);
    background:color-mix(in srgb, var(--bg) 82%, transparent);
    -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  }
  #dimmer{
    position:fixed; inset:0; z-index:100; pointer-events:none;
    background:#000; opacity:0;
  }
  input[type="range"]{
    width:100%; margin:10px 0 2px; -webkit-appearance:none; appearance:none;
    height:6px; border-radius:999px; background:var(--surface2); outline-offset:4px;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:26px; height:26px; border-radius:50%; background:var(--accent);
    border:none; cursor:pointer;
  }

  h1,h2,h3{ margin:0; text-wrap:balance; }
  .num{ font-family:ui-rounded, -apple-system, system-ui, sans-serif; font-variant-numeric:tabular-nums; }

  .eyebrow{
    font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
    color:var(--ink2); margin-bottom:4px;
  }
  .bigdate{ font-size:30px; font-weight:800; letter-spacing:-.02em; line-height:1.15; }

  .card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-top:14px;
  }
  .card.accent-card{ border-color:transparent; background:var(--accent); color:var(--accent-ink); }
  .card.accent-card .sub{ color:var(--accent-ink); opacity:.75; }
  .card.done-card{ border-color:transparent; background:var(--up); color:var(--up-ink); }
  .card.done-card .sub, .card.done-card .tiny{ color:var(--up-ink); opacity:1; }
  .card.done-card .eyebrow{ opacity:1 !important; }
  .done-card .chip{
    background:transparent; color:var(--up-ink);
    border-color:color-mix(in srgb, var(--up-ink) 40%, transparent);
  }

  .sub{ color:var(--ink2); font-size:14px; }
  .tiny{ color:var(--ink3); font-size:12px; }

  .btn{
    display:block; width:100%; border:none; border-radius:14px;
    background:var(--accent); color:var(--accent-ink);
    font-size:17px; font-weight:700; font-family:inherit;
    padding:15px 16px; margin-top:14px; cursor:pointer;
  }
  .btn.on-accent{ background:var(--accent-ink); color:var(--accent); }
  .btn.on-accent-ghost{
    background:transparent; color:var(--accent-ink);
    border:1px solid color-mix(in srgb, var(--accent-ink) 40%, transparent);
    font-weight:600;
  }
  .btn.on-done{ background:var(--up-ink); color:var(--up); }
  .btn.ghost{
    background:var(--surface); color:var(--ink); border:1px solid var(--line);
    font-weight:600;
  }
  .btn.danger-ghost{ background:var(--surface); color:var(--danger); border:1px solid var(--line); font-weight:600; }
  .btn.small{ width:auto; display:inline-block; font-size:14px; padding:9px 14px; margin-top:0; }
  .btn:active{ opacity:.82; }
  button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible{
    outline:2px solid var(--accent); outline-offset:2px;
  }

  .row{ display:flex; align-items:center; gap:10px; }
  .row.between{ justify-content:space-between; }
  .stack{ display:flex; flex-direction:column; gap:10px; }

  .listitem{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:13px 14px; margin-top:10px; cursor:pointer; width:100%;
    font-family:inherit; font-size:16px; color:var(--ink); text-align:left;
  }
  .chev{ color:var(--ink3); flex:none; }

  .backlink{
    display:inline-flex; align-items:center; gap:6px;
    background:none; border:none; color:var(--ink2); font-family:inherit;
    font-size:15px; font-weight:600; padding:0; margin-bottom:14px; cursor:pointer;
  }

  input[type="text"], input[type="date"], select{
    width:100%; background:var(--surface); color:var(--ink);
    border:1px solid var(--line); border-radius:12px;
    font-family:inherit; font-size:16px; padding:11px 12px;
    appearance:none; -webkit-appearance:none;
  }
  input[type="date"]{ min-height:46px; }
  .listitem.breakitem{ border-style:dashed; cursor:default; }
  .eyebrowrow{ display:flex; align-items:center; justify-content:space-between; margin-top:28px; }
  .eyebrowrow .eyebrow{ margin:0; }
  .minibtn{
    border:1px solid var(--line); background:var(--surface); color:var(--ink2);
    border-radius:999px; padding:6px 12px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  }
  .selectwrap{ position:relative; }
  .selectwrap::after{
    content:""; position:absolute; right:14px; top:50%;
    width:8px; height:8px; border-right:2px solid var(--ink2); border-bottom:2px solid var(--ink2);
    transform:translateY(-70%) rotate(45deg); pointer-events:none;
  }

  /* Tracking */
  .excard{ padding:14px 14px 12px; }
  .exname{ font-size:17px; font-weight:700; }
  .lastline{ font-size:13px; color:var(--ink2); margin-top:2px; }
  .setrow{ display:flex; align-items:center; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .setnum{ width:20px; flex:none; font-size:13px; color:var(--ink3); font-weight:600; }
  .checkbtn{
    flex:none; width:46px; height:44px; border:1px solid var(--line); background:var(--surface2);
    color:var(--ink3); border-radius:12px; cursor:pointer;
    font-size:20px; font-weight:800; font-family:inherit; line-height:1;
    display:flex; align-items:center; justify-content:center;
  }
  .checkbtn:active{ background:var(--line); }
  .checkbtn.on{ background:var(--up); border-color:transparent; color:var(--up-ink); }
  .setrow.setdone .stepval{ opacity:.6; }
  .stepgroup{
    display:flex; align-items:center; gap:0; flex:1 1 auto; min-width:120px; max-width:144px;
    background:var(--surface2); border-radius:12px; overflow:hidden;
  }
  .stepgroup.reps{ flex:0 0 78px; min-width:78px; max-width:78px; }
  .stepbtn{
    width:30px; height:44px; flex:none; border:none; background:none;
    color:var(--ink2); font-size:20px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  .stepbtn:active{ background:var(--line); }
  .stepval{
    flex:1; min-width:0; height:44px; border:none; background:none; text-align:center;
    white-space:nowrap;
    font-family:ui-rounded, -apple-system, system-ui, sans-serif;
    font-size:17px; font-weight:700; color:var(--ink); padding:0;
    font-variant-numeric:tabular-nums; cursor:pointer;
  }
  .stepval.up{ color:var(--up); }
  .stepval.down{ color:var(--danger); }
  .stepval .arr{ font-size:0.6em; font-weight:800; margin-left:1px; }
  /* Picker: eigenes iOS-Style-Rad im Bottom-Sheet */
  #picker{ position:fixed; inset:0; z-index:30; }
  #picker[hidden]{ display:none; }
  #pickerBackdrop{ position:absolute; inset:0; background:rgba(0,0,0,.45); }
  #pickerPanel{
    position:absolute; left:0; right:0; bottom:0; max-width:460px; margin:0 auto;
    background:var(--surface); border-radius:20px 20px 0 0;
    padding:6px 16px calc(10px + env(safe-area-inset-bottom));
    box-shadow:0 -12px 40px rgba(0,0,0,.35);
    animation:pickerUp .22s ease-out;
  }
  @keyframes pickerUp{ from{ transform:translateY(40px); opacity:.4; } to{ transform:none; opacity:1; } }
  @media (prefers-reduced-motion: reduce){ #pickerPanel{ animation:none; } }
  .pickerHead{ display:flex; align-items:center; gap:10px; padding:6px 2px; }
  #pickerTitle{ font-size:13px; font-weight:600; color:var(--ink2); flex:1; min-width:0; }
  #pickerInput{
    width:88px; text-align:center; background:var(--surface2); border:1px solid var(--line);
    border-radius:10px; padding:8px 6px; -webkit-appearance:none; appearance:none;
    font-family:ui-rounded, -apple-system, system-ui, sans-serif; font-size:17px; font-weight:700;
    color:var(--ink); font-variant-numeric:tabular-nums;
  }
  #pickerInput[hidden]{ display:none; }
  #pickerDone{
    border:none; background:none; color:var(--accent); font-family:inherit;
    font-size:16px; font-weight:800; padding:6px 4px; cursor:pointer;
  }
  .wheelwrap{ position:relative; }
  #pickerBar{
    position:absolute; left:6px; right:6px; top:calc(50% - 20px); height:40px;
    background:var(--surface2); border-radius:12px; pointer-events:none;
  }
  #pickerWheel{
    position:relative; height:200px; overflow-y:auto; scroll-snap-type:y mandatory;
    -webkit-mask-image:linear-gradient(transparent, #000 28%, #000 72%, transparent);
    mask-image:linear-gradient(transparent, #000 28%, #000 72%, transparent);
    -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
  }
  #pickerWheel::-webkit-scrollbar{ display:none; }
  #pickerItems{ padding:80px 0; }
  .pickerItem{
    height:40px; display:flex; align-items:center; justify-content:center; gap:6px;
    scroll-snap-align:center; cursor:pointer;
    font-family:ui-rounded, -apple-system, system-ui, sans-serif;
    font-size:20px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;
  }
  .pickerUnit{ font-size:12px; color:var(--ink3); font-weight:600; }
  .unit{ font-size:10px; color:var(--ink3); font-weight:600; flex:none; padding-right:5px; }
  .donebtn{
    width:100%; margin-top:12px; border:none; border-radius:12px; cursor:pointer;
    font-family:inherit; font-size:15px; font-weight:700; padding:11px;
    background:var(--surface2); color:var(--ink2);
  }
  .excard.done{ border-color:color-mix(in srgb, var(--up) 55%, transparent); }
  .excard.done .donebtn{ background:color-mix(in srgb, var(--up) 16%, transparent); color:var(--up); }
  /* aktuelle Übung: deutlich umrandet */
  .excard.current{ border-color:var(--accent); box-shadow:0 0 0 1.5px var(--accent); }
  .nowtag{
    display:inline-block; margin-left:8px; vertical-align:2px;
    background:var(--accent); color:var(--accent-ink); border-radius:999px;
    font-size:10px; font-weight:800; letter-spacing:.06em; padding:3px 8px;
  }
  .setactions{ display:flex; gap:8px; margin-top:10px; }
  .setactions button{
    flex:1; border:none; border-radius:10px; background:none; border:1px dashed var(--line);
    color:var(--ink2); font-family:inherit; font-size:13px; font-weight:600; padding:8px; cursor:pointer;
  }

  /* Chips (weekdays) */
  .chips{ display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .chip{
    border:1px solid var(--line); background:var(--surface); color:var(--ink2);
    border-radius:999px; padding:7px 13px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
  }
  .chip.active{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }

  /* Plan editor */
  .exeditrow{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:12px 12px; margin-top:10px;
  }
  .miniinput{
    width:52px; text-align:center; text-align-last:center; background:var(--surface2);
    border:none; border-radius:10px; -webkit-appearance:none; appearance:none;
    font-family:ui-rounded, -apple-system, system-ui, sans-serif; font-size:16px; font-weight:700;
    color:var(--ink); padding:9px 4px; font-variant-numeric:tabular-nums;
  }
  .iconbtn{
    width:34px; height:34px; flex:none; border:1px solid var(--line); background:var(--surface);
    border-radius:10px; color:var(--ink2); font-size:15px; cursor:pointer; font-family:inherit;
  }
  .iconbtn:disabled{ opacity:.35; cursor:default; }
  .restlist{ display:flex; flex-wrap:wrap; gap:8px 12px; margin-top:8px; }
  .restpick{ display:flex; align-items:center; gap:6px; }

  /* Stats + chart */
  .stattiles{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:14px; }
  .tile{
    background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:12px;
  }
  .tile .v{ font-size:22px; font-weight:800; letter-spacing:-.01em; }
  .tile .v.up{ color:var(--accent); }
  .chartbox{ margin-top:6px; }
  .tipbox{
    min-height:20px; font-size:13px; font-weight:600; color:var(--ink2); text-align:right;
    font-variant-numeric:tabular-nums;
  }
  svg text{ font-family:-apple-system, system-ui, sans-serif; }

  .empty{
    text-align:center; color:var(--ink2); font-size:15px; padding:28px 10px;
  }

  /* Tab bar */
  #tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    background:color-mix(in srgb, var(--bg) 82%, transparent);
    -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
    border-top:1px solid var(--line);
    padding:8px 0 calc(8px + env(safe-area-inset-bottom));
  }
  #tabbar .inner{ max-width:460px; margin:0 auto; display:flex; }
  /* Workout-Fortschritt: dünne Leiste auf der Oberkante der Tab-Leiste */
  #progressbar{
    position:absolute; top:-1px; left:0; right:0; height:3px;
    background:var(--line); display:none;
  }
  #progressbar.on{ display:block; }
  #progressfill{
    height:100%; width:0; background:var(--accent);
    border-radius:0 999px 999px 0; transition:width .35s ease;
  }
  @media (prefers-reduced-motion: reduce){ #progressfill{ transition:none; } }
  .tab{
    flex:1; background:none; border:none; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--ink3); font-size:11px; font-weight:600; padding:4px 0;
  }
  .tab.active{ color:var(--accent); }
  .tab svg{ width:24px; height:24px; }

  /* Pausen-Timer: großes Overlay über dem Bildschirm */
  #resttimer{
    position:fixed; inset:0; z-index:40;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; padding:24px;
    background:color-mix(in srgb, var(--bg) 92%, transparent);
    -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px);
    animation:restIn .2s ease-out;
  }
  #resttimer[hidden]{ display:none; }
  @keyframes restIn{ from{ opacity:0; } to{ opacity:1; } }
  #restlabel{ font-size:15px; font-weight:700; color:var(--ink2); letter-spacing:.02em; text-align:center; }
  #restclock{
    font-family:ui-rounded, -apple-system, system-ui, sans-serif;
    font-size:26vw; line-height:1; font-weight:800; letter-spacing:-.03em; color:var(--ink);
    font-variant-numeric:tabular-nums; margin:2px 0 6px;
  }
  @media (min-width:460px){ #restclock{ font-size:120px; } }
  #restprog{ width:min(78vw, 360px); height:6px; border-radius:999px; background:var(--surface2); overflow:hidden; }
  #restfill{ height:100%; width:100%; background:var(--accent); transition:width .95s linear; }
  #resttimer.over #restclock, #resttimer.over #restlabel{ color:var(--up); }
  #resttimer.over #restfill{ background:var(--up); width:100% !important; }
  /* kurzes grünes Aufblitzen, dann schließt sich der Timer von selbst */
  #resttimer.over{ background:color-mix(in srgb, var(--up) 14%, var(--bg)); }
  #resttimer.over #restclock{ animation:flashGreen .45s ease-out 2; }
  #resttimer.over .restbtns{ display:none; }
  @keyframes flashGreen{
    0%{ transform:scale(1); opacity:1; }
    45%{ transform:scale(1.09); opacity:.65; }
    100%{ transform:scale(1); opacity:1; }
  }
  @media (prefers-reduced-motion: reduce){ #resttimer.over #restclock{ animation:none; } }
  .restbtns{ display:flex; gap:12px; margin-top:14px; align-items:center; justify-content:center; }
  .restbtns:first-of-type{ margin-top:26px; }
  .restbtn{
    border:1px solid var(--line); background:var(--surface); color:var(--ink);
    border-radius:999px; padding:13px 20px; font-family:inherit; font-size:16px; font-weight:700; cursor:pointer;
  }
  .restbtn.primary{ background:var(--accent); color:var(--accent-ink); border-color:transparent; }
  #resttimer.over .restbtn.primary{ background:var(--up); color:var(--up-ink); }

  /* Toast */
  #toast{
    position:fixed; left:50%; bottom:calc(88px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(8px); z-index:20;
    display:flex; align-items:center; gap:12px; white-space:nowrap;
    background:var(--ink); color:var(--bg); font-size:14px; font-weight:600;
    padding:10px 18px; border-radius:999px; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  #toastUndo{
    display:none; border:none; background:none; padding:0; cursor:pointer;
    font-family:inherit; font-size:14px; font-weight:800; color:var(--toast-accent);
  }
  #toast.undoable #toastUndo{ display:inline; }
  @media (prefers-reduced-motion: reduce){
    #toast{ transition:none; }
  }
</style>
</head>
<body>

<div id="statusbar-shim"></div>
<div id="dimmer"></div>
<div id="app"></div>

<nav id="tabbar" aria-label="Navigation">
  <div id="progressbar" role="progressbar" aria-label="Workout-Fortschritt"><div id="progressfill"></div></div>
  <div class="inner">
    <button class="tab" data-action="nav" data-view="home" aria-label="Heute">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h2M19 12h2M7 8v8M17 8v8M7 12h10"/><rect x="5" y="9" width="2" height="6" rx="1" fill="currentColor" stroke="none"/><rect x="17" y="9" width="2" height="6" rx="1" fill="currentColor" stroke="none"/></svg>
      Heute
    </button>
    <button class="tab" data-action="nav" data-view="plans" aria-label="Plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h12M8 12h12M8 18h12"/><circle cx="4" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.3" fill="currentColor" stroke="none"/></svg>
      Plan
    </button>
    <button class="tab" data-action="nav" data-view="analytics" aria-label="Fortschritt">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19L10 12l4 4 6-8"/><circle cx="20" cy="8" r="1.6" fill="currentColor" stroke="none"/></svg>
      Fortschritt
    </button>
    <button class="tab" data-action="nav" data-view="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="7.2" stroke-dasharray="3.1 2.6"/><circle cx="12" cy="12" r="3"/></svg>
      Settings
    </button>
  </div>
</nav>

<div id="resttimer" hidden>
  <span id="restlabel">Pause</span>
  <div id="restclock">0:00</div>
  <div id="restprog"><div id="restfill"></div></div>
  <div class="restbtns">
    <button class="restbtn" id="restminus">−15 s</button>
    <button class="restbtn" id="restplus">+15 s</button>
  </div>
  <div class="restbtns">
    <button class="restbtn primary" id="reststop">Pause beenden</button>
  </div>
</div>

<div id="toast" role="status"><span id="toastMsg"></span><button id="toastUndo">Rückgängig</button></div>

<div id="picker" hidden>
  <div id="pickerBackdrop"></div>
  <div id="pickerPanel">
    <div class="pickerHead"><span id="pickerTitle"></span><input id="pickerInput" inputmode="decimal" hidden><button id="pickerDone">Fertig</button></div>
    <div class="wheelwrap">
      <div id="pickerBar"></div>
      <div id="pickerWheel"><div id="pickerItems"></div></div>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  /* ---------- Storage ---------- */
  var KEY = 'overload.v1';
  var uid = function(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); };

  function seed(){
    var ex = function(name, sets, reps, repsMax, bw, rest){ return { id:uid(), name:name, sets:sets, reps:reps, repsMax:repsMax || null, bw:!!bw, mode: bw ? 'bw' : 'weight', rest: rest == null ? 90 : rest }; };
    var plan = {
      id: uid(), name: '3-Day Split',
      days: [
        { id:uid(), name:'Push', weekdays:[1], exercises:[
          ex('Bankdrücken',3,6,8), ex('Schulterdrücken',3,8,10), ex('Dips',3,8,12,true),
          ex('Seitheben',3,12,15), ex('Trizeps am Kabel',3,10,12) ] },
        { id:uid(), name:'Pull', weekdays:[2], exercises:[
          ex('Klimmzüge',3,6,10,true), ex('Langhantel-Rudern',3,6,8), ex('Latzug',3,8,12),
          ex('Face Pulls',3,12,15), ex('Bizeps-Curls',3,10,12) ] },
        { id:uid(), name:'Legs', weekdays:[5], exercises:[
          ex('Kniebeugen',3,6,8), ex('Rumänisches Kreuzheben',3,8,10), ex('Beinpresse',3,8,12),
          ex('Beinbeugen',3,10,12), ex('Wadenheben',4,12,15) ] }
      ]
    };
    return { plans:[plan], activePlanId:plan.id, sessions:[], draft:null };
  }

  var db;
  try {
    db = JSON.parse(localStorage.getItem(KEY));
  } catch(e){ db = null; }
  if (!db || !db.plans) db = seed();
  if (!db.settings) db.settings = { theme:'auto', brightness:100 };
  if (!db.settings.accent) db.settings.accent = 'blue';
  if (!db.breaks) db.breaks = [];

  function save(){
    try { localStorage.setItem(KEY, JSON.stringify(db)); } catch(e){ /* storage blocked: app keeps working in memory */ }
  }
  save();

  /* ---------- Helpers ---------- */
  var WD_LABELS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  var WD_VALUES = [1,2,3,4,5,6,0];
  var WD_LONG = { 1:'Montag', 2:'Dienstag', 3:'Mittwoch', 4:'Donnerstag', 5:'Freitag', 6:'Samstag', 0:'Sonntag' };

  function todayISO(){
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function parseISO(iso){
    var p = iso.split('-');
    return new Date(+p[0], +p[1]-1, +p[2]);
  }
  function fmtLong(iso){
    return parseISO(iso).toLocaleDateString('de-DE', { weekday:'long', day:'numeric', month:'long' });
  }
  function fmtShort(iso){
    return parseISO(iso).toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
  }
  function fmtDM(iso){
    return parseISO(iso).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' });
  }
  function fmtW(w){
    if (w === null || w === undefined || isNaN(w)) return '';
    return String(w).replace('.', ',');
  }
  function parseNum(str){
    if (typeof str !== 'string') return null;
    var v = parseFloat(str.replace(',', '.'));
    return isNaN(v) ? null : v;
  }
  function esc(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function activePlan(){
    for (var i=0;i<db.plans.length;i++) if (db.plans[i].id === db.activePlanId) return db.plans[i];
    return db.plans[0] || null;
  }
  function findPlan(id){
    for (var i=0;i<db.plans.length;i++) if (db.plans[i].id === id) return db.plans[i];
    return null;
  }
  function findDay(plan, id){
    if (!plan) return null;
    for (var i=0;i<plan.days.length;i++) if (plan.days[i].id === id) return plan.days[i];
    return null;
  }
  function sortedSessions(){
    return db.sessions.slice().sort(function(a,b){
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return (a.ts||0) < (b.ts||0) ? 1 : -1;
    });
  }
  function lastSetsFor(name, beforeSessionId){
    var key = name.trim().toLowerCase();
    var list = sortedSessions();
    for (var i=0;i<list.length;i++){
      if (beforeSessionId && list[i].id === beforeSessionId) continue;
      var s = list[i];
      for (var j=0;j<s.entries.length;j++){
        var e = s.entries[j];
        if (e.name.trim().toLowerCase() === key && e.sets.length) return { sets:e.sets, date:s.date };
      }
    }
    return null;
  }
  function isBWSets(sets){
    for (var i=0;i<sets.length;i++){ if ((sets[i].w||0) > 0) return false; }
    return sets.length > 0;
  }
  // mode: 'weight' (normal), 'bw' (nur Wdh.), 'bwplus' (Zusatzgewicht, "+kg")
  function exMode(x){
    return x.mode || (x.bw ? 'bw' : 'weight');
  }
  function fmtSets(sets, mode){
    if (mode === undefined) mode = isBWSets(sets) ? 'bw' : 'weight';
    if (mode === true || mode === 'bw') return sets.map(function(s){ return (s.r || 0); }).join(' · ') + ' Wdh.';
    var plus = mode === 'bwplus' ? '+' : '';
    return sets.map(function(s){
      var w = (s.w === null || s.w === undefined) ? 0 : s.w;
      return plus + fmtW(w) + ' kg × ' + (s.r || 0);
    }).join('  ·  ');
  }
  function summarizeLast(last, mode){
    if (!last) return 'Erstes Mal — noch keine Daten';
    return 'Letztes Mal (' + fmtDM(last.date) + '): ' + fmtSets(last.sets, mode);
  }
  // compares a set's value with last time. field 'w' = weight, 'r' = reps.
  // weight falls back to last workout's top set; reps compare same set number.
  function setDelta(e, si, field, val){
    if (!e.last || val === null || val === undefined) return '';
    var ref = e.last.sets[si] ? e.last.sets[si][field] : null;
    if (field === 'w' && (ref === null || ref === undefined)){
      ref = 0;
      for (var i=0;i<e.last.sets.length;i++) ref = Math.max(ref, e.last.sets[i].w || 0);
    }
    if (ref === null || ref === undefined) return '';
    if (val > ref) return 'up';
    if (val < ref) return 'down';
    return '';
  }
  function weightDeltaClass(e, si, w){ return setDelta(e, si, 'w', w); }
  // updates a value button's number, colour and arrow in place
  // value + kleiner Pfeil (▲/▼) als HTML
  function valHTML(field, val, cls){
    var t = (val === null || val === undefined) ? '–' : (field === 'w' ? fmtW(val) : val);
    return t + (cls ? ' <span class="arr">' + (cls === 'up' ? '▲' : '▼') + '</span>' : '');
  }
  function updateValBtn(btn, e, si, field, val){
    var group = btn.closest('.stepgroup');
    var pb = group ? group.querySelector('[data-action="pick"][data-field="' + field + '"]') : btn;
    if (!pb) return;
    var cls = setDelta(e, si, field, val);
    pb.classList.remove('up','down');
    if (cls) pb.classList.add(cls);
    pb.innerHTML = valHTML(field, val, cls);
  }
  function updateWBtn(btn, e, si, w){ updateValBtn(btn, e, si, 'w', w); }
  // "01.08. – 21.08.2026 · 3 Wochen" for a break entry
  function breakLabel(b){
    var days = Math.round((parseISO(b.to) - parseISO(b.from)) / 86400000) + 1;
    var dur = days === 1 ? '1 Tag'
            : (days % 7 === 0 ? (days / 7) + (days === 7 ? ' Woche' : ' Wochen') : days + ' Tage');
    var range = b.from === b.to ? fmtShort(b.from) : fmtDM(b.from) + ' – ' + fmtShort(b.to);
    return range + ' · ' + dur;
  }
  // Pausenzeit einer Übung (Standard 90 s, 0 = aus) und Anzeige als "1:30"
  function exRest(x){
    return (x && x.rest != null) ? x.rest : 90;
  }
  // Pausenzeit für einen bestimmten Satz (Array x.rests), sonst letzter Wert bzw. Einzelwert
  function restForSet(x, si){
    if (x.rests && x.rests[si] != null) return x.rests[si];
    if (x.rests && x.rests.length) return x.rests[x.rests.length - 1];
    return exRest(x);
  }
  function fmtTime(sec){
    sec = Math.max(0, Math.round(sec));
    return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
  }
  // "6–8" for a rep range, "10" for a single target
  function fmtRepsRange(ex){
    return (ex.repsMax != null && ex.repsMax > ex.reps) ? ex.reps + '–' + ex.repsMax : String(ex.reps);
  }
  // list of pickable values, e.g. weights 0–300 in 0.5 steps; null = "not set" (–)
  function rangeVals(min, max, step, withNull, cur){
    var vals = withNull ? [null] : [];
    for (var v = min; v <= max + 1e-9; v += step){
      vals.push(Math.round(v * 100) / 100);
    }
    if (cur !== null && cur !== undefined && vals.indexOf(cur) === -1) vals.push(cur);
    return vals;
  }
  // update the number shown on a value button next to a +/- stepper
  function setPickDisplay(btn, v){
    var pb = btn.parentNode.querySelector('[data-action="pick"]');
    if (pb) pb.textContent = (v === null || v === undefined) ? '–' : fmtW(v);
  }

  /* ---- Bottom-sheet wheel picker ---- */
  var ITEM_H = 40;
  var pickerCtx = null; // { values, onDone }

  // opts.type ('weight'|'reps') enables the type-in field next to the wheel
  function openPicker(title, values, cur, unit, onDone, fmtFn, opts){
    pickerCtx = { values: values, onDone: onDone, type: (opts && opts.type) || null };
    var lbl = fmtFn || fmtW;
    var html = '';
    for (var i = 0; i < values.length; i++){
      html += '<div class="pickerItem" data-i="' + i + '">' +
              (values[i] === null ? '–' : lbl(values[i])) +
              (unit && values[i] !== null ? '<span class="pickerUnit">' + unit + '</span>' : '') +
              '</div>';
    }
    document.getElementById('pickerTitle').textContent = title;
    document.getElementById('pickerItems').innerHTML = html;
    var inp = document.getElementById('pickerInput');
    if (pickerCtx.type){
      inp.hidden = false;
      inp.setAttribute('inputmode', pickerCtx.type === 'weight' ? 'decimal' : 'numeric');
      inp.value = (cur === null || cur === undefined) ? '' : (pickerCtx.type === 'weight' ? fmtW(cur) : cur);
    } else {
      inp.hidden = true; inp.value = '';
    }
    document.getElementById('picker').hidden = false;
    var idx = 0;
    for (var j = 0; j < values.length; j++){
      var a = values[j], b = cur;
      if (a === b || (a !== null && b !== null && b !== undefined && Math.abs(a - b) < 1e-9)){ idx = j; break; }
    }
    document.getElementById('pickerWheel').scrollTop = idx * ITEM_H;
  }
  function closePicker(){
    if (!pickerCtx) return;
    var wheel = document.getElementById('pickerWheel');
    var idx = Math.max(0, Math.min(pickerCtx.values.length - 1, Math.round(wheel.scrollTop / ITEM_H)));
    var value = pickerCtx.values[idx];
    // a typed number wins over the wheel position
    var inp = document.getElementById('pickerInput');
    if (pickerCtx.type && !inp.hidden){
      var raw = (inp.value || '').trim();
      if (raw !== ''){
        var num = parseNum(raw);
        if (num !== null){
          num = Math.max(0, num);
          value = pickerCtx.type === 'weight' ? Math.round(num * 2) / 2 : Math.round(num);
        }
      }
    }
    var done = pickerCtx.onDone;
    pickerCtx = null;
    document.getElementById('picker').hidden = true;
    done(value);
  }
  document.getElementById('pickerDone').addEventListener('click', closePicker);
  document.getElementById('pickerBackdrop').addEventListener('click', closePicker);
  document.getElementById('pickerItems').addEventListener('click', function(ev){
    var item = ev.target.closest('.pickerItem');
    if (!item) return;
    document.getElementById('pickerWheel').scrollTo({ top: (+item.getAttribute('data-i')) * ITEM_H, behavior: 'smooth' });
  });
  // keep the type-in field in sync while scrolling the wheel (unless it's being typed in)
  var pickerScrollT = null;
  document.getElementById('pickerWheel').addEventListener('scroll', function(){
    if (!pickerCtx || !pickerCtx.type) return;
    var inp = document.getElementById('pickerInput');
    if (document.activeElement === inp) return;
    clearTimeout(pickerScrollT);
    pickerScrollT = setTimeout(function(){
      if (!pickerCtx) return;
      var wheel = document.getElementById('pickerWheel');
      var idx = Math.max(0, Math.min(pickerCtx.values.length - 1, Math.round(wheel.scrollTop / ITEM_H)));
      var v = pickerCtx.values[idx];
      inp.value = (v === null || v === undefined) ? '' : (pickerCtx.type === 'weight' ? fmtW(v) : v);
    }, 80);
  });
  document.getElementById('pickerInput').addEventListener('keydown', function(ev){
    if (ev.key === 'Enter'){ ev.preventDefault(); this.blur(); closePicker(); }
  });

  /* ---------- View state ---------- */
  var view = { name:'home' };
  var confirmArm = null;   // id of button armed for 2-step confirm
  var chartTip = null;     // tapped point index in analytics
  var analyticsEx = null;  // selected exercise name

  // erledigte Übungen des laufenden Workouts
  function draftProgress(){
    var d = db.draft;
    if (!d || !d.entries.length) return null;
    var done = 0;
    d.entries.forEach(function(e){ if (e.done) done++; });
    return { done: done, total: d.entries.length };
  }
  // dünne Leiste auf der Tab-Leiste; nur während des Trackings sichtbar
  function updateProgressBar(){
    var bar = document.getElementById('progressbar');
    var p = view.name === 'track' ? draftProgress() : null;
    bar.classList.toggle('on', !!p);
    if (!p) return;
    var pct = Math.round(p.done / p.total * 100);
    document.getElementById('progressfill').style.width = pct + '%';
    bar.setAttribute('aria-valuenow', String(pct));
  }

  /* ---- Pausen-Timer ---- */
  var restTick = null;
  var audioCtx = null;

  // AudioContext beim ersten Tippen freischalten (iOS erlaubt Ton nur nach Geste)
  function unlockAudio(){
    try {
      if (!audioCtx){
        var AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    } catch(e){ /* kein Ton verfügbar */ }
  }
  function beep(){
    if (!audioCtx) return;
    try {
      var t0 = audioCtx.currentTime;
      [0, 0.3].forEach(function(off){
        var o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = 880;
        g.gain.setValueAtTime(0.0001, t0 + off);
        g.gain.exponentialRampToValueAtTime(0.4, t0 + off + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + off + 0.24);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0 + off); o.stop(t0 + off + 0.26);
      });
    } catch(e){ /* Ton fehlgeschlagen */ }
  }

  function startRest(seconds, name){
    if (!seconds) return;
    unlockAudio();
    db.rest = { endsAt: Date.now() + seconds * 1000, total: seconds, name: name || '', rang: false };
    save();
    tickRest();
    if (restTick) clearInterval(restTick);
    restTick = setInterval(tickRest, 250);
  }
  function stopRest(){
    db.rest = null; save();
    if (restTick){ clearInterval(restTick); restTick = null; }
    tickRest();
  }
  function tickRest(){
    var el = document.getElementById('resttimer');
    var r = db.rest;
    if (!r){ el.hidden = true; return; }
    el.hidden = false;

    var left = (r.endsAt - Date.now()) / 1000;
    if (left <= 0){
      if (!r.rang){ r.rang = true; save(); beep(); }
      if (left < -1.8){ stopRest(); return; }   // kurz grün aufblitzen, dann zurück zum Workout
      el.classList.add('over');
      document.getElementById('restlabel').textContent = 'Pause vorbei' + (r.name ? ' · ' + r.name : '');
      document.getElementById('restclock').textContent = '0:00';
      document.getElementById('restfill').style.width = '100%';
      return;
    }
    el.classList.remove('over');
    document.getElementById('restlabel').textContent = r.name || 'Pause';
    document.getElementById('restclock').textContent = fmtTime(left);
    document.getElementById('restfill').style.width = Math.min(100, left / r.total * 100) + '%';
  }

  // Pause während des Laufens in 15-s-Schritten anpassen
  function restAdjust(delta){
    if (!db.rest) return;
    var now = Date.now();
    var base = Math.max(0, (db.rest.endsAt - now) / 1000);
    var newLeft = base + delta;
    if (newLeft <= 0){ stopRest(); return; }   // auf 0 reduziert = Pause beenden
    db.rest.endsAt = now + newLeft * 1000;
    if (newLeft > db.rest.total) db.rest.total = newLeft;
    db.rest.rang = false;
    save(); tickRest();
    if (!restTick) restTick = setInterval(tickRest, 250);
  }
  document.getElementById('restplus').addEventListener('click', function(){ restAdjust(15); });
  document.getElementById('restminus').addEventListener('click', function(){ restAdjust(-15); });
  document.getElementById('reststop').addEventListener('click', stopRest);

  // Pausenzeit live aus dem Plan lesen, damit Plan-Änderungen sofort greifen
  function entryRestForSet(e, si){
    var d = db.draft;
    if (d){
      var day = findDay(findPlan(d.planId), d.dayId);
      if (day){
        for (var i = 0; i < day.exercises.length; i++){
          if (day.exercises[i].id === e.exId) return restForSet(day.exercises[i], si);
        }
      }
    }
    if (e.rests && e.rests[si] != null) return e.rests[si];
    if (e.rests && e.rests.length) return e.rests[e.rests.length - 1];
    return e.rest != null ? e.rest : 90;
  }

  var undoSnapshot = null;

  function toast(msg, undoable){
    var t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.toggle('undoable', !!undoable);
    t.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ t.classList.remove('show'); }, undoable ? 7000 : 2200);
  }

  // call BEFORE a destructive change: remembers the current state for one-step undo
  function rememberForUndo(){
    undoSnapshot = JSON.stringify(db);
  }

  document.getElementById('toastUndo').addEventListener('click', function(){
    if (!undoSnapshot) return;
    db = JSON.parse(undoSnapshot);
    undoSnapshot = null;
    save();
    document.getElementById('toast').classList.remove('show');
    render();
    toast('Wiederhergestellt ✓');
  });

  /* ---------- Renderers ---------- */
  var app = document.getElementById('app');

  function render(){
    var html = '';
    switch(view.name){
      case 'home': html = rHome(); break;
      case 'track': html = rTrack(); break;
      case 'session': html = rSession(); break;
      case 'plans': html = rPlans(); break;
      case 'planEdit': html = rPlanEdit(); break;
      case 'dayEdit': html = rDayEdit(); break;
      case 'analytics': html = rAnalytics(); break;
      case 'settings': html = rSettings(); break;
    }
    app.innerHTML = html;
    var tabs = document.querySelectorAll('.tab');
    var tabView = (view.name === 'home' || view.name === 'track' || view.name === 'session') ? 'home'
                : (view.name === 'analytics') ? 'analytics'
                : (view.name === 'settings') ? 'settings' : 'plans';
    tabs.forEach(function(t){ t.classList.toggle('active', t.getAttribute('data-view') === tabView); });
    updateProgressBar();
    window.scrollTo(0, view._keepScroll ? window.scrollY : 0);
    view._keepScroll = false;
  }

  /* ----- Home ----- */
  function rHome(){
    var plan = activePlan();
    var iso = todayISO();
    var h = '<div class="eyebrow">Heute</div>' +
            '<div class="bigdate">' + esc(fmtLong(iso)) + '</div>';

    if (!plan){
      h += '<div class="card"><div class="sub">Noch kein Plan vorhanden.</div>' +
           '<button class="btn" data-action="nav" data-view="plans">Plan erstellen</button></div>';
    } else {
      // plan switcher (only if >1)
      if (db.plans.length > 1){
        h += '<div class="selectwrap" style="margin-top:14px"><select data-action="switch-plan" aria-label="Aktiver Plan">';
        db.plans.forEach(function(p){
          h += '<option value="' + p.id + '"' + (p.id === db.activePlanId ? ' selected' : '') + '>' + esc(p.name) + '</option>';
        });
        h += '</select></div>';
      } else {
        h += '<div class="sub" style="margin-top:6px">' + esc(plan.name) + '</div>';
      }

      var wd = new Date().getDay();
      var today = null;
      for (var i=0;i<plan.days.length;i++){
        if (plan.days[i].weekdays.indexOf(wd) !== -1){ today = plan.days[i]; break; }
      }
      var doneToday = db.sessions.filter(function(s){ return s.date === iso; });

      if (db.draft){
        var isOld = db.draft.date !== iso;
        h += '<div class="card accent-card">' +
             '<div class="eyebrow" style="color:inherit;opacity:.7">Angefangen' + (isOld ? ' am ' + fmtDM(db.draft.date) : '') + '</div>' +
             '<h2 style="font-size:24px">' + esc(db.draft.dayName) + '</h2>' +
             '<div class="sub">' + db.draft.entries.length + ' Übungen</div>' +

             '<button class="btn on-accent-ghost" data-action="discard" data-confirm="discard">' +
             (confirmArm === 'discard' ? 'Wirklich verwerfen?' : 'Workout verwerfen') + '</button>' +
             '</div>';
      } else if (doneToday.length){
        var namesToday = doneToday.map(function(s){ return s.dayName; }).join(' · ');
        var setsToday = 0;
        doneToday.forEach(function(s){ s.entries.forEach(function(e){ setsToday += e.sets.length; }); });
        h += '<div class="card done-card">' +
             '<div class="eyebrow" style="color:inherit;opacity:.7">Erledigt</div>' +
             '<h2 style="font-size:24px">Workout für heute abgehakt ✓</h2>' +
             '<div class="sub">' + esc(namesToday) + ' · ' + setsToday + ' Sätze</div>' +
             '<button class="btn on-done" data-action="open-session" data-id="' + doneToday[0].id + '">Workout ansehen</button>' +
             '<div class="tiny" style="margin-top:14px">Noch eins dranhängen?</div><div class="chips">';
        plan.days.forEach(function(day){
          h += '<button class="chip" data-action="start" data-day="' + day.id + '">' + esc(day.name) + '</button>';
        });
        h += '</div></div>';
      } else if (today){
        var lastDone = null;
        var list = sortedSessions();
        for (var k=0;k<list.length;k++){
          if (list[k].dayName === today.name){ lastDone = list[k].date; break; }
        }
        h += '<div class="card accent-card">' +
             '<div class="eyebrow" style="color:inherit;opacity:.7">Heutiges Workout</div>' +
             '<h2 style="font-size:24px">' + esc(today.name) + '</h2>' +
             '<div class="sub">' + today.exercises.length + ' Übungen' +
             (lastDone ? ' · zuletzt am ' + fmtDM(lastDone) : '') + '</div>' +
             '<button class="btn on-accent" data-action="start" data-day="' + today.id + '">Workout tracken</button>' +
             '</div>';
      } else {
        // next training day
        var next = null, nd = null;
        for (var d=1; d<=7 && !next; d++){
          var w2 = (wd + d) % 7;
          for (var j=0;j<plan.days.length;j++){
            if (plan.days[j].weekdays.indexOf(w2) !== -1){ next = plan.days[j]; nd = w2; break; }
          }
        }
        h += '<div class="card">' +
             '<h2 style="font-size:19px">Heute ist Ruhetag</h2>' +
             (next ? '<div class="sub" style="margin-top:4px">Nächstes Workout: <strong>' + esc(next.name) + '</strong> am ' + WD_LONG[nd] + '</div>' : '') +

          h += '<button class="chip" data-action="start" data-day="' + day.id + '">' + esc(day.name) + '</button>';

    var sessions = sortedSessions();
    h += '<div class="eyebrowrow"><span class="eyebrow">Archiv</span>' +

      var iso2 = todayISO();
      h += '<div class="card">' +
           '<div class="tiny">Von</div><input type="date" id="brFrom" value="' + iso2 + '">' +
           '<div class="tiny" style="margin-top:10px">Bis</div><input type="date" id="brTo" value="' + iso2 + '">' +
           '<div class="tiny" style="margin-top:10px">Grund (optional)</div>' +
           '<input type="text" id="brNote" placeholder="z. B. Urlaub, krank">' +
           '<button class="btn" data-action="save-break">Pause speichern</button>' +
           '<button class="btn ghost" data-action="toggle-break-form">Abbrechen</button>' +
           '</div>';

    var items = sessions.map(function(s){ return { type:'s', date:s.date, s:s }; })
      .concat(db.breaks.map(function(b){ return { type:'b', date:b.to, b:b }; }));
    items.sort(function(a,b){ return a.date < b.date ? 1 : a.date > b.date ? -1 : 0; });

    if (!items.length){
      h += '<div class="empty">Noch keine Workouts getrackt.<br>Dein erstes erscheint hier.</div>';
    } else {
      items.forEach(function(it){
        if (it.type === 's'){
          var s = it.s, nSets = 0;
          s.entries.forEach(function(e){ nSets += e.sets.length; });
          h += '<button class="listitem" data-action="open-session" data-id="' + s.id + '">' +
               '<span><strong>' + esc(s.dayName) + '</strong><br><span class="sub">' + esc(fmtShort(s.date)) + ' · ' + s.entries.length + ' Übungen · ' + nSets + ' Sätze</span></span>' +
               '<span class="chev">›</span></button>';
        } else {
          var b = it.b;
          h += '<div class="listitem breakitem">' +
               '<span><strong>Pause' + (b.note ? ' · ' + esc(b.note) : '') + '</strong><br><span class="sub">' + esc(breakLabel(b)) + '</span></span>' +
               '<button class="iconbtn" data-action="del-break" data-id="' + b.id + '" aria-label="Pause löschen">✕</button>' +
               '</div>';
        }
      });
    }
    return h;
  }

  /* ----- Tracking ----- */
  // Übungs-Eintrag fürs Tracking aus einer Plan-Übung bauen
  function makeEntry(ex){
    var last = lastSetsFor(ex.name);
    var sets;
    if (last){
      sets = last.sets.map(function(s){ return { w:s.w, r:s.r }; });
    } else {
      sets = [];
      for (var i=0;i<ex.sets;i++) sets.push({ w:null, r:ex.reps });
    }
    var mode = exMode(ex);
    return { exId:ex.id, name:ex.name, sets:sets, done:false, touched:false,
             bw: mode === 'bw', mode: mode, rest: exRest(ex), rests: (ex.rests ? ex.rests.slice() : null),
             target: ex.sets + ' Sätze × ' + fmtRepsRange(ex) + ' Wdh.',
             last:last ? { sets:last.sets, date:last.date } : null };
  }

  // Laufendes Workout mit dem Plan abgleichen: gelöschte Übungen raus,
  // neue rein, Reihenfolge wie im Plan. Bereits getrackte Übungen bleiben erhalten.
  function syncDraftWithPlan(){
    var d = db.draft;
    if (!d) return;
    var day = findDay(findPlan(d.planId), d.dayId);
    if (!day) return;
    var byId = {};
    d.entries.forEach(function(e){ byId[e.exId] = e; });
    var next = [];
    day.exercises.forEach(function(ex){
      next.push(byId[ex.id] || makeEntry(ex));
      delete byId[ex.id];
    });
    Object.keys(byId).forEach(function(k){
      var e = byId[k];
      var used = e.touched || e.done || e.sets.some(function(s){ return s.done; });
      if (used) next.push(e);   // schon getrackt → nicht wegwerfen
    });
    var changed = next.length !== d.entries.length ||
                  next.some(function(e, i){ return e !== d.entries[i]; });
    if (changed){ d.entries = next; save(); }
  }

  function startDraft(dayId){
    var plan = activePlan();
    var day = findDay(plan, dayId);
    if (!day) return;
    var entries = day.exercises.map(makeEntry);
    db.draft = { date:todayISO(), planId:plan.id, dayId:day.id, dayName:day.name, entries:entries };
    save();
    view = { name:'track' };
    render();
  }

  function rTrack(){
    syncDraftWithPlan();   // Plan-Änderungen (gelöschte/neue Übungen) übernehmen
    var d = db.draft;
    if (!d){ view = { name:'home' }; return rHome(); }
    var prog = draftProgress();
    var h = '<button class="backlink" data-action="nav" data-view="home">‹ Zurück</button>' +
            '<div class="eyebrow">' + esc(fmtLong(d.date)) + '</div>' +
            '<div class="bigdate">' + esc(d.dayName) + '</div>' +
            (prog ? '<div class="sub" style="margin-top:4px">' + prog.done + ' von ' + prog.total + ' Übungen erledigt</div>' : '');

    // erste noch offene Übung = die, die gerade dran ist
    var currentIdx = -1;
    for (var ci = 0; ci < d.entries.length; ci++){
      if (!d.entries[ci].done){ currentIdx = ci; break; }
    }

    d.entries.forEach(function(e, ei){
      var isCurrent = ei === currentIdx;
      h += '<div class="card excard' + (e.done ? ' done' : '') + (isCurrent ? ' current' : '') + '"' +
           (isCurrent ? ' id="currentEx"' : '') + '>' +
           '<div class="exname">' + esc(e.name) +
             (isCurrent ? '<span class="nowtag">JETZT</span>' : '') + '</div>' +
           (e.target ? '<div class="lastline">Ziel: ' + esc(e.target) + '</div>' : '') +
           '<div class="lastline">' + esc(summarizeLast(e.last, e.mode || (e.bw ? 'bw' : undefined))) + '</div>';
      e.sets.forEach(function(s, si){
        var wCls = e.bw ? '' : setDelta(e, si, 'w', s.w);
        var rCls = setDelta(e, si, 'r', s.r);
        h += '<div class="setrow' + (s.done ? ' setdone' : '') + '">' +
             '<span class="setnum num">' + (si+1) + '</span>' +
             (e.bw ? '' :
             '<div class="stepgroup">' +
               '<button class="stepbtn" data-action="w-dec" data-ex="' + ei + '" data-set="' + si + '" aria-label="Gewicht minus">−</button>' +
               '<button class="stepval' + (wCls ? ' ' + wCls : '') + '" data-action="pick" data-field="w" data-ex="' + ei + '" data-set="' + si + '" aria-label="Gewicht wählen">' +
                 valHTML('w', s.w, wCls) + '</button>' +
               '<span class="unit">' + (e.mode === 'bwplus' ? '+KG' : 'KG') + '</span>' +
               '<button class="stepbtn" data-action="w-inc" data-ex="' + ei + '" data-set="' + si + '" aria-label="Gewicht plus">+</button>' +
             '</div>') +
             '<div class="stepgroup' + (e.bw ? '' : ' reps') + '">' +
               '<button class="stepbtn" data-action="r-dec" data-ex="' + ei + '" data-set="' + si + '" aria-label="Wiederholungen minus">−</button>' +
               '<button class="stepval' + (rCls ? ' ' + rCls : '') + '" data-action="pick" data-field="r" data-ex="' + ei + '" data-set="' + si + '" aria-label="Wiederholungen wählen">' +
                 valHTML('r', s.r, rCls) + '</button>' +
               '<span class="unit">WDH</span>' +
               (e.bw ? '<button class="stepbtn" data-action="r-inc" data-ex="' + ei + '" data-set="' + si + '" aria-label="Wiederholungen plus">+</button>' : '') +
             '</div>' +
             '<button class="checkbtn' + (s.done ? ' on' : '') + '" data-action="set-check" data-ex="' + ei + '" data-set="' + si + '" aria-label="Satz ' + (si+1) + ' abhaken">✓</button>' +
             '</div>';
      });
      h += '<div class="setactions">' +
           '<button data-action="add-set" data-ex="' + ei + '">＋ Satz</button>' +
           (e.sets.length > 1 ? '<button data-action="rem-set" data-ex="' + ei + '">− Satz</button>' : '') +
           '</div>' +
           '<button class="donebtn" data-action="toggle-done" data-ex="' + ei + '">' +
           (e.done ? '✓ Erledigt' : 'Übung abhaken') + '</button>' +
           '</div>';
    });

    h += '<button class="btn" data-action="finish">Workout abschließen</button>' +
         '<button class="btn danger-ghost" data-action="discard" data-confirm="discard">' +
         (confirmArm === 'discard' ? 'Wirklich verwerfen?' : 'Workout verwerfen') + '</button>';
    return h;
  }

  function finishWorkout(){
    var d = db.draft;
    if (!d) return;
    var entries = [];
    d.entries.forEach(function(e){
      if (!e.done && !e.touched) return; // untouched exercises are not saved
      var sets = e.sets.filter(function(s){ return (s.r||0) > 0 || (s.w||0) > 0; })
                       .map(function(s){ return { w:(s.w===null?0:s.w), r:(s.r===null?0:s.r) }; });
      if (sets.length) entries.push({ exId:e.exId, name:e.name, bw:!!e.bw, mode: e.mode || (e.bw ? 'bw' : 'weight'), sets:sets });
    });
    if (!entries.length){ toast('Nichts eingetragen — hake mindestens eine Übung ab'); return; }
    db.sessions.push({ id:uid(), ts:Date.now(), date:d.date, planName:(findPlan(d.planId)||{}).name || '', dayName:d.dayName, entries:entries });
    db.draft = null;
    stopRest();
    save();
    view = { name:'home' };
    render();
    toast('Workout gespeichert ✓');
  }

  function rDayEdit(){
    var p = findPlan(view.planId);
    var d = findDay(p, view.dayId);
    if (!d){ view = { name:'plans' }; return rPlans(); }
    var h = '<button class="backlink" data-action="open-plan" data-id="' + p.id + '">‹ ' + esc(p.name) + '</button>' +
            '<div class="eyebrow">Trainingstag</div>' +
            '<input type="text" value="' + esc(d.name) + '" data-field="day-name" aria-label="Name des Trainingstags" style="font-size:22px;font-weight:800;margin-top:6px">';

    h += '<div class="eyebrow" style="margin-top:20px">Wochentage</div><div class="chips">';
    WD_VALUES.forEach(function(v, i){
      var on = d.weekdays.indexOf(v) !== -1;
